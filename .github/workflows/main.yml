name: Keep Supabase Alive

on:
  schedule:
    # Runs every Sunday and Thursday at midnight UTC
    - cron: '0 0 * * 0,4'
  workflow_dispatch: # allows manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Ping Supabase Storage
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/storage/v1/object/list/models" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
