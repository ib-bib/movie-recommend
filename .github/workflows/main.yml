name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 12 * * 0" # Runs every Sunday at 12:00 UTC
  workflow_dispatch: # allows manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Supabase Health
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://iecnbcynismtfjjgbtnq.supabase.co/rest/v1/
